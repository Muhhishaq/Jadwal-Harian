<!DOCTYPE html><html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jadwal Belajar Saya</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: white;
      margin: 0;
      padding: 20px;
    }
    h1 {
      text-align: center;
    }
    .card {
      background: rgba(255,255,255,0.1);
      padding: 15px;
      border-radius: 15px;
      margin-bottom: 15px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }
    .title {
      font-weight: bold;
      margin-bottom: 10px;
    }
    .checklist label {
      display: block;
      margin: 5px 0;
    }
    .footer {
      text-align: center;
      margin-top: 20px;
      font-size: 12px;
      opacity: 0.7;
    }
  </style>
</head>
<body><h1>📅 Jadwal Belajar Saya</h1><div class="card">
  <div class="title">🌅 Pagi</div>
  <p>04.30 - 05.15 → Hafalan Al-Qur'an</p>
  <p>05.15 - 05.30 → Hafalan Matan</p>
</div><div class="card">
  <div class="title">🏫 Sekolah</div>
  <p>06.00 - 16.00</p>
</div><div class="card">
  <div class="title">🌙 Malam</div>
  <p>20.30 - 21.00 → Tugas Sekolah</p>
  <p>21.00 - 21.30 → Pelajaran Kitab</p>
  <p>21.30 - 22.00 → Membaca</p>
</div><div class="card checklist">
  <div class="title">✅ Checklist Harian</div>
  <label><input type="checkbox"> Hafalan Qur'an</label>
  <label><input type="checkbox"> Matan</label>
  <label><input type="checkbox"> Kitab</label>
  <label><input type="checkbox"> Tugas Sekolah</label>
</div><div class="footer">
  Dibuat oleh Ishaq 🚀
</div></body>
</html>
