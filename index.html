<!DOCTYPE html><html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jadwal Pelajaran</title>
  <style>
    :root{
      --bg:#0b0b0b;--card:#141414;--line:#262626;--text:#f5f5f5;--muted:#a3a3a3;--accent:#ffffff;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:Inter,system-ui,Arial,sans-serif;background:var(--bg);color:var(--text)}
    header{padding:18px 14px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between}
    header h2{margin:0;font-weight:600;letter-spacing:.5px}
    .badge{font-size:12px;color:var(--muted)}
    nav{display:flex;gap:6px;overflow:auto;padding:10px;border-bottom:1px solid var(--line)}
    nav button{white-space:nowrap;background:transparent;border:1px solid var(--line);color:var(--text);padding:8px 12px;border-radius:999px;cursor:pointer}
    nav button.active{background:var(--accent);color:#000}
    .container{padding:14px}
    .grid{display:grid;grid-template-columns:1fr;gap:10px}
    .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px}
    .card h3{margin:0 0 6px 0;font-size:16px}
    .time{color:var(--muted);font-size:12px;margin-bottom:6px}
    .hidden{display:none}
    .days{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}
    .days button{background:#101010;border:1px solid var(--line);color:var(--text);padding:8px;border-radius:10px;cursor:pointer}
    .days button.active{background:#fff;color:#000}
    footer{padding:14px;color:var(--muted);text-align:center;border-top:1px solid var(--line)}
  </style>
</head>
<body>
  <header>
    <h2>Jadwal Belajar</h2>
    <div class="badge" id="tanggal"></div>
  </header>  <nav id="nav">
    <button data-menu="utama" class="active">Utama</button>
    <button data-menu="harian">Jadwal Harian</button>
    <button data-menu="pelajaran">Pelajaran</button>
    <button data-menu="murajaah">Murajaah</button>
    <button data-menu="hafalan">Hafalan</button>
  </nav>  <div class="container">
    <div id="utama"></div><div id="harian" class="hidden">
  <div class="days" id="dayButtons"></div>
  <div id="jadwalHari" class="grid"></div>
</div>

<div id="pelajaran" class="hidden grid">
  <div class="card"><h3>Shofwatuzzubad</h3><div class="time">30 menit</div></div>
  <div class="card"><h3>Tsalatsatul Ushul</h3><div class="time">30 menit</div></div>
  <div class="card"><h3>Nahwu</h3><div class="time">30 menit</div></div>
  <div class="card"><h3>Durusullughoh</h3><div class="time">1 jam</div></div>
  <div class="card"><h3>Shorof</h3><div class="time">30 menit</div></div>
</div>

<div id="murajaah" class="hidden grid">
  <div class="card"><h3>Al-Qur'an</h3><div class="time">Subuh + malam ringan</div></div>
  <div class="card"><h3>Matan</h3><div class="time">Subuh + malam</div></div>
  <div class="card"><h3>Kitab</h3><div class="time">Ahad tambahan</div></div>
</div>

<div id="hafalan" class="hidden grid">
  <div class="card"><h3>Al-Qur'an</h3><div class="time">04.30 – 05.15</div></div>
  <div class="card"><h3>Matan Qowaidul Arba</h3><div class="time">05.15 – 05.30</div></div>
</div>

  </div>  <footer>Modern Black UI  </footer>  <script>
    const days = ['Ahad','Senin','Selasa','Rabu','Kamis','Jumat','Sabtu'];

    const jadwal = {
      Senin: [
        ['04.30 – 05.15','Hafalan Al-Qur\'an'],
        ['05.15 – 05.30','Hafalan Matan'],
        ['06.00 – 16.00','Sekolah'],
        ['16.30 – 17.30','Istirahat'],
        ['17.30 – 18.00','Murajaah'],
        ['18.00 – 20.00','Taklim (Bulughul Maram)'],
        ['20.00 – 20.30','Istirahat'],
        ['20.30 – 21.00','Tugas'],
        ['21.00 – 21.30','Nahwu + Shofwatuzzubad'],
        ['21.30 – 22.00','Membaca']
      ],
      Selasa: [
        ['04.30 – 05.30','Hafalan'],
        ['06.00 – 16.00','Sekolah'],
        ['16.00 – 20.30','Latihan Anggar'],
        ['20.30 – 21.00','Istirahat'],
        ['21.00 – 21.30','Tugas'],
        ['21.30 – 22.00','Murajaah']
      ],
      Rabu: [
        ['04.30 – 05.30','Hafalan'],
        ['06.00 – 16.00','Sekolah'],
        ['16.30 – 17.30','Istirahat'],
        ['17.30 – 18.00','Murajaah'],
        ['18.00 – 20.00','Taklim (Riyadusshalihin)'],
        ['20.30 – 21.00','Tugas'],
        ['21.00 – 21.30','Shorof + Tsalatsatul Ushul'],
        ['21.30 – 22.00','Membaca']
      ],
      Kamis: [
        ['04.30 – 05.30','Hafalan'],
        ['06.00 – 16.00','Sekolah'],
        ['16.30 – 17.30','Istirahat'],
        ['17.30 – 18.00','Murajaah'],
        ['18.00 – 20.00','Taklim (Fikih & Asmaul Husna)'],
        ['20.30 – 21.00','Tugas'],
        ['21.00 – 21.30','Durusul Lughah + Nahwu'],
        ['21.30 – 22.00','Membaca']
      ],
      Jumat: [
        ['04.30 – 05.30','Hafalan'],
        ['06.00 – 16.00','Sekolah'],
        ['16.30 – 17.30','Istirahat'],
        ['17.30 – 18.00','Murajaah'],
        ['20.00 – 20.30','Tugas'],
        ['20.30 – 21.30','Durusullughoh'],
        ['21.30 – 22.00','Membaca']
      ],
      Sabtu: [
        ['04.30 – 05.30','Hafalan'],
        ['16.00 – 20.30','Latihan Anggar'],
        ['20.30 – 21.00','Istirahat'],
        ['21.00 – 21.30','Tugas'],
        ['21.30 – 22.00','Murajaah']
      ],
      Ahad: [
        ['04.30 – 05.30','Hafalan'],
        ['16.30 – 17.30','Istirahat'],
        ['17.30 – 18.00','Murajaah'],
        ['18.00 – 20.00','Taklim (Shahih Bukhari)'],
        ['20.30 – 21.00','Tugas'],
        ['21.00 – 21.30','Shorof + Tsalatsatul Usul'],
        ['21.30 – 22.00','Membaca']
      ]
    };

    function renderDay(day){
      const box = document.getElementById('jadwalHari');
      box.innerHTML = '';
      jadwal[day].forEach(([w,k])=>{
        box.innerHTML += `<div class='card'><div class='time'>${w}</div><h3>${k}</h3></div>`;
      });
      document.querySelectorAll('.days button').forEach(b=>b.classList.remove('active'));
      document.querySelector(`[data-day="${day}"]`).classList.add('active');
    }

    function buildDayButtons(){
      const wrap = document.getElementById('dayButtons');
      days.forEach(d=>{
        wrap.innerHTML += `<button data-day='${d}'>${d}</button>`;
      });
      wrap.onclick = (e)=>{
        const d = e.target.getAttribute('data-day');
        if(d) renderDay(d);
      };
    }

    function getToday(){
      const map = ['Ahad','Senin','Selasa','Rabu','Kamis','Jumat','Sabtu'];
      return map[new Date().getDay()];
    }

    function loadUtama(){
      const today = getToday();
      const el = document.getElementById('utama');
      el.innerHTML = `<div class='card'><h3>Hari ini: ${today}</h3></div>`;
      jadwal[today].forEach(([w,k])=>{
        el.innerHTML += `<div class='card'><div class='time'>${w}</div><h3>${k}</h3></div>`;
      });
    }

    function switchMenu(menu){
      document.querySelectorAll('.container > div').forEach(d=>d.classList.add('hidden'));
      document.getElementById(menu).classList.remove('hidden');
      document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
      document.querySelector(`nav button[data-menu="${menu}"]`).classList.add('active');
    }

    document.getElementById('nav').onclick = (e)=>{
      const m = e.target.getAttribute('data-menu');
      if(m) switchMenu(m);
    };

    function setTanggal(){
      const t = new Date();
      document.getElementById('tanggal').innerText = t.toLocaleDateString('id-ID',{weekday:'long', day:'numeric', month:'long'});
    }

    buildDayButtons();
    loadUtama();
    setTanggal();
    renderDay(getToday());
  </script></body>
</html>
