<!DOCTYPE html><html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jadwal Belajar</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0d0d0d;
      color: white;
    }
    header {
      padding: 15px;
      text-align: center;
      border-bottom: 1px solid #333;
    }
    nav {
      display: flex;
      justify-content: space-around;
      padding: 10px;
      border-bottom: 1px solid #333;
    }
    nav button {
      background: none;
      border: none;
      color: white;
      font-size: 14px;
      cursor: pointer;
    }
    .container {
      padding: 15px;
    }
    .card {
      background: #1a1a1a;
      padding: 15px;
      margin-bottom: 10px;
      border-radius: 10px;
    }
    .hidden { display: none; }
  </style>
</head>
<body><header>
  <h2>Jadwal Belajar</h2>
</header><nav>
  <button onclick="showMenu('utama')">Utama</button>
  <button onclick="showMenu('harian')">Jadwal Harian</button>
  <button onclick="showMenu('pelajaran')">Pelajaran</button>
  <button onclick="showMenu('murajaah')">Murajaah</button>
  <button onclick="showMenu('hafalan')">Hafalan</button>
</nav><div class="container">  <div id="utama"></div>  <div id="harian" class="hidden">
    <button onclick="showDay('senin')">Senin</button>
    <button onclick="showDay('selasa')">Selasa</button>
    <button onclick="showDay('rabu')">Rabu</button>
    <button onclick="showDay('kamis')">Kamis</button>
    <button onclick="showDay('jumat')">Jumat</button>
    <button onclick="showDay('sabtu')">Sabtu</button>
    <button onclick="showDay('ahad')">Ahad</button><div id="jadwalHari"></div>

  </div>  <div id="pelajaran" class="hidden">
    <div class="card">Shofwatuzzubad - 30 menit</div>
    <div class="card">Tsalatsatul Ushul - 30 menit</div>
    <div class="card">Nahwu - 30 menit</div>
    <div class="card">Durusul Lughoh - 1 jam</div>
    <div class="card">Shorof - 30 menit</div>
  </div>  <div id="murajaah" class="hidden">
    <div class="card">Al-Quran</div>
    <div class="card">Kitab</div>
    <div class="card">Matan</div>
  </div>  <div id="hafalan" class="hidden">
    <div class="card">Matan Qowaidul Arba</div>
    <div class="card">Al-Quran</div>
  </div></div><script>

const jadwal = {
  senin: [
    "06:00-16:00 Sekolah",
    "18:00-20:00 Taklim (Bulughul Maram)",
    "20:00-21:30 Belajar Kitab",
    "21:30-22:00 Tugas Sekolah",
  ],
  selasa: [
    "06:00-16:00 Sekolah",
    "16:00-20:30 Latihan Anggar",
    "21:00-22:00 Belajar Ringan",
  ],
  rabu: [
    "06:00-16:00 Sekolah",
    "18:00-20:00 Taklim (Riyadusshalihin)",
    "20:00-21:30 Belajar Kitab",
    "21:30-22:00 Tugas",
  ],
  kamis: [
    "06:00-16:00 Sekolah",
    "18:00-20:00 Taklim (Fikih & Asmaul Husna)",
    "20:00-21:30 Belajar Kitab",
    "21:30-22:00 Tugas",
  ],
  jumat: [
    "06:00-16:00 Sekolah",
    "20:00-21:30 Belajar (non kitab)",
    "21:30-22:00 Tugas",
  ],
  sabtu: [
    "16:00-20:30 Latihan Anggar",
    "21:00-22:00 Murajaah",
  ],
  ahad: [
    "18:00-20:00 Taklim (Shahih Bukhari)",
    "20:00-21:30 Belajar Kitab",
  ]
};

function showMenu(menu) {
  document.querySelectorAll('.container > div').forEach(div => div.classList.add('hidden'));
  document.getElementById(menu).classList.remove('hidden');
}

function showDay(day) {
  const container = document.getElementById('jadwalHari');
  container.innerHTML = '';
  jadwal[day].forEach(item => {
    container.innerHTML += `<div class='card'>${item}</div>`;
  });
}

function getToday() {
  const days = ['minggu','senin','selasa','rabu','kamis','jumat','sabtu'];
  const today = days[new Date().getDay()];
  return today === 'minggu' ? 'ahad' : today;
}

function loadToday() {
  const today = getToday();
  const utama = document.getElementById('utama');
  utama.innerHTML = `<h3>Jadwal Hari Ini (${today})</h3>`;
  jadwal[today].forEach(item => {
    utama.innerHTML += `<div class='card'>${item}</div>`;
  });
}

loadToday();

</script></body>
    </html>
